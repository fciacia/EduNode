<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7C3AED">
  <link rel="manifest" href="/static/icons/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/style.css">
  <title>{% block title %}EduNode{% endblock %}</title>
  <style>{% block extra_style %}{% endblock %}</style>
</head>
<body>

<div id="offlineBanner" class="offline-banner">
  📡 You are offline — EduNode is running locally on this device!
</div>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      🌟 EduNode
    </a>
    <span id="nav-level-badge" class="nav-level-badge"></span>
    <div class="nav-links">
      <a href="/chat"      class="nav-link {% if request.path == '/chat'      %}active{% endif %}">💬 Chat</a>
      <a href="/quiz"      class="nav-link {% if request.path == '/quiz'      %}active{% endif %}" data-i18n="nav.quiz">🧠 Quiz</a>
      <a href="/flashcard" class="nav-link {% if request.path == '/flashcard' %}active{% endif %}" data-i18n="nav.cards">🃏 Cards</a>
      <a href="/podcast"   class="nav-link {% if request.path == '/podcast'   %}active{% endif %}" data-i18n="nav.podcast">🎧 Podcast</a>
      <a href="/progress"  class="nav-link {% if request.path == '/progress'  %}active{% endif %}" data-i18n="nav.progress">🏆 Progress</a>
    </div>
  </div>
</nav>

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<!-- Floating theme toggle — must be in DOM before the script below -->
<button class="theme-fab" id="themeToggle" aria-label="Toggle theme">
  🌙<span class="toggle-label">Dark</span>
</button>

<script>
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('edu_theme', t);
    const btn = document.getElementById('themeToggle');
    btn.innerHTML = t === 'dark'
      ? '☀️<span class="toggle-label">Light</span>'
      : '🌙<span class="toggle-label">Dark</span>';
  }

  setTheme(localStorage.getItem('edu_theme') || 'light');

  document.getElementById('themeToggle').addEventListener('click', function() {
    setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  function updateOffline() {
    document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
  }
  window.addEventListener('online',  updateOffline);
  window.addEventListener('offline', updateOffline);
  updateOffline();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    // When a new SW takes control (after update), reload so fresh HTML is served
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      window.location.reload();
    });
  }
</script>

<script src="/static/js/i18n.js" defer></script>
<script src="/static/js/onboarding.js" defer></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
