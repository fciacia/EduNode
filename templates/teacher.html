<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7C3AED">
  <link rel="icon" type="image/png" href="/static/icons/edge-shortlogo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/style.css">
  <title>Teacher Dashboard — Edge</title>
  <style>
    body.teacher-body { align-items: stretch; background: var(--bg); }
    .teacher-nav {
      display: flex; align-items: center; gap: .9rem;
      padding: 1.4rem 1.75rem;
      background: linear-gradient(120deg, #3B1874 0%, #5B21B6 45%, #7C3AED 75%, #C026D3 100%);
      position: relative; overflow: hidden;
    }
    .teacher-nav img { height: 2.1rem; filter: brightness(0) invert(1); position: relative; z-index: 1; }
    .teacher-nav .hub-badge {
      padding: .3rem .8rem; background: rgba(255,255,255,.18); color: #fff;
      border-radius: 99px; font-size: .74rem; font-weight: 800; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .teacher-nav .dash-title {
      font-family: var(--font-display); font-weight: 400; font-size: 1.05rem; color: #fff;
      margin: 0; position: relative; z-index: 1;
    }
    .teacher-nav .spacer { flex: 1; }
    .teacher-nav .btn-outline {
      padding: .5rem 1.15rem; background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.55); border-radius: 99px; font-family: var(--font);
      font-weight: 800; font-size: .84rem; cursor: pointer; transition: background .15s;
      display: inline-flex; align-items: center; gap: .4rem; text-decoration: none;
      position: relative; z-index: 1;
    }
    .teacher-nav .btn-outline:hover { background: rgba(255,255,255,.26); }

    .teacher-wrap { max-width: 1080px; margin: 0 auto; padding: 1.75rem 1.75rem 3rem; width: 100%; }

    .t-section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.4rem 1.5rem; margin-bottom: 1.25rem; }
    .t-section h3 { font-family: var(--font-display); font-weight: 400; font-size: 1.02rem; color: var(--primary); margin: 0 0 1rem; }
    .t-section .hint { color: var(--text-muted); font-weight: 600; font-size: .82rem; margin: -.6rem 0 1rem; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .85rem; }
    .kpi { background: var(--surface2); border-radius: 14px; padding: 1rem 1.1rem; }
    .kpi .num { font-family: var(--font-display); font-weight: 400; font-size: 1.55rem; color: var(--primary); line-height: 1; }
    .kpi .lbl { color: var(--text-muted); font-size: .74rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-top: .4rem; }

    .tbl { width: 100%; border-collapse: collapse; font-size: .87rem; }
    .tbl th { background: var(--surface2); padding: .55rem .8rem; text-align: left; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .tbl td { padding: .55rem .8rem; border-bottom: 1px solid var(--border); color: var(--text); font-weight: 600; }
    .tbl tr:last-child td { border-bottom: none; }

    .pct-chip { padding: .15rem .6rem; border-radius: 99px; font-weight: 800; font-size: .76rem; }
    .pct-low { background: color-mix(in srgb, #DC2626 14%, var(--surface)); color: #DC2626; }
    .pct-mid { background: color-mix(in srgb, #D97706 14%, var(--surface)); color: #D97706; }
    .pct-ok  { background: color-mix(in srgb, #10B981 14%, var(--surface)); color: #10B981; }

    .bar-row { display: flex; align-items: center; gap: .7rem; margin: .5rem 0; font-size: .85rem; }
    .bar-row .name { width: 130px; flex: 0 0 auto; font-weight: 700; color: var(--text); }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 99px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--primary); border-radius: 99px; }
    .bar-row .val { width: 36px; text-align: right; font-weight: 800; color: var(--text-muted); }

    .flag { padding: .8rem 0; border-bottom: 1px solid var(--border); font-size: .87rem; }
    .flag:last-child { border-bottom: none; }
    .flag .lang { font-weight: 800; color: var(--primary); }
    .flag .note { color: var(--text); font-weight: 600; }
    .flag .ts { color: var(--text-muted); font-size: .74rem; }
    .fix-row { display: flex; gap: .5rem; margin-top: .55rem; flex-wrap: wrap; }
    .fix-row input {
      flex: 1; min-width: 180px; border: 1px solid var(--border); border-radius: 99px;
      padding: .45rem .9rem; font-family: var(--font); font-weight: 700; font-size: .85rem;
      background: var(--surface); color: var(--text); outline: none;
    }
    .fix-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .fix-row button {
      padding: .45rem 1.1rem; background: var(--primary); color: #fff; border: none;
      border-radius: 99px; font-family: var(--font); font-size: .85rem; font-weight: 800; cursor: pointer;
    }
    .fix-row button:hover { background: var(--primary-dark); }
    .fix-row button:disabled { opacity: .5; cursor: not-allowed; }
    .fix-done { color: #10B981; font-weight: 800; font-size: .84rem; }

    .empty { color: var(--text-muted); font-size: .87rem; font-weight: 600; padding: .5rem 0; }
    .load-error { color: #DC2626; font-weight: 700; font-size: .9rem; }
  </style>
</head>
<body class="teacher-body">

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <use href="/static/icons/sprite.svg"></use>
</svg>

<nav class="teacher-nav">
  <img src="/static/icons/edge-logo.png" alt="Edge">
  <span class="hub-badge">{{ hub_id }}</span>
  <h2 class="dash-title">Teacher Dashboard</h2>
  <div class="spacer"></div>
  <button type="button" class="btn-outline" id="logoutBtn">
    <svg class="icon" aria-hidden="true"><use href="/static/icons/sprite.svg#icon-log-out"></use></svg> Log out
  </button>
</nav>

<div class="teacher-wrap">
  <div class="t-section">
    <h3>Class Overview</h3>
    <div class="kpi-grid" id="kpiGrid"><div class="empty">Loading…</div></div>
  </div>

  <div class="t-section">
    <h3>Most-Missed Concepts</h3>
    <div id="missedWrap"><div class="empty">Loading…</div></div>
  </div>

  <div class="t-section">
    <h3>AI Usage by Subject</h3>
    <div id="subjectWrap"><div class="empty">Loading…</div></div>
  </div>

  <div class="t-section">
    <h3>Daily Activity</h3>
    <div id="dayWrap"><div class="empty">Loading…</div></div>
  </div>

  <div class="t-section">
    <h3>Flagged Translations / Answers</h3>
    <p class="hint">Reports students/teachers raised — review and correct to improve the local language.</p>
    <div id="flagsWrap"><div class="empty">Loading…</div></div>
  </div>
</div>

<script>
function pctClass(p) { return p < 50 ? 'pct-low' : (p < 80 ? 'pct-mid' : 'pct-ok'); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function bars(rows, nameKey, valKey, target) {
  const el = document.getElementById(target);
  if (!rows.length) { el.innerHTML = '<div class="empty">No data yet.</div>'; return; }
  const max = Math.max(...rows.map(r => r[valKey]), 1);
  el.innerHTML = rows.map(r => `
    <div class="bar-row">
      <span class="name">${esc(r[nameKey])}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${Math.round(r[valKey]/max*100)}%"></span></span>
      <span class="val">${r[valKey]}</span>
    </div>`).join('');
}

// If a ?token= is still in the URL (e.g. an old shared link), exchange it for
// the HttpOnly cookie so subsequent API calls are authenticated, then strip it
// from the URL so the secret isn't left in browser history.
async function ensureAuth() {
  const params = new URLSearchParams(location.search);
  const urlToken = params.get('token') || '';
  if (!urlToken) return;
  try {
    await fetch('/api/admin/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: urlToken}),
    });
  } catch (e) { /* fall back to cookie if already set */ }
  params.delete('token');
  history.replaceState({}, '', location.pathname + (params.toString() ? '?' + params : ''));
}

async function load() {
  let d;
  try {
    const r = await fetch('/api/teacher/analytics');
    if (r.status === 401 || r.status === 403) { location.href = '/login'; return; }
    if (!r.ok) throw new Error('Could not load dashboard data (status ' + r.status + ').');
    d = await r.json();
  } catch (e) {
    document.getElementById('kpiGrid').innerHTML = '<div class="load-error">' + esc(e.message) + '</div>';
    return;
  }

  const o = d.overview || {};
  const avg = o.class_avg_pct == null ? '—' : o.class_avg_pct + '%';
  document.getElementById('kpiGrid').innerHTML = [
    ['Students', o.students], ['Sessions', o.sessions], ['Quiz attempts', o.quiz_attempts],
    ['Class average', avg], ['Active today', o.active_today],
  ].map(([lbl, num]) => `<div class="kpi"><div class="num">${num ?? 0}</div><div class="lbl">${lbl}</div></div>`).join('');

  const missed = d.most_missed || [];
  document.getElementById('missedWrap').innerHTML = missed.length
    ? `<table class="tbl"><thead><tr><th>Concept</th><th>Class avg</th><th>Students</th><th>Attempts</th></tr></thead><tbody>${
        missed.map(m => `<tr><td>${esc(m.topic)}</td><td><span class="pct-chip ${pctClass(m.avg_pct)}">${m.avg_pct}%</span></td><td>${m.students}</td><td>${m.attempts}</td></tr>`).join('')
      }</tbody></table>`
    : '<div class="empty">No quiz data yet.</div>';

  bars(d.by_subject || [], 'subject', 'sessions', 'subjectWrap');
  bars(d.by_day || [], 'day', 'sessions', 'dayWrap');

  const flags = d.flags || [];
  document.getElementById('flagsWrap').innerHTML = flags.length
    ? flags.map((f, i) => `<div class="flag" data-i="${i}">
        <span class="lang">${esc(f.language)}</span> — <span class="note">${esc(f.note || f.shown || '(no note)')}</span> <span class="ts">${esc(f.ts || '')}</span>
        <div class="fix-row">
          <input data-lang="${esc(f.language)}" data-orig="${esc(f.shown || '')}" placeholder="Correct wording in ${esc(f.language)}…">
          <button onclick="submitFix(this)">Save correction</button>
        </div>
      </div>`).join('')
    : '<div class="empty">No flags raised.</div>';
}

async function submitFix(btn) {
  const input = btn.parentElement.querySelector('input');
  const corrected = input.value.trim();
  if (!corrected) { input.focus(); return; }
  btn.disabled = true;
  try {
    const r = await fetch('/api/translation/correct', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        language: input.dataset.lang, original: input.dataset.orig, corrected,
      }),
    });
    if (!r.ok) throw new Error('save failed');
    btn.parentElement.innerHTML = '<span class="fix-done">Saved — will improve future translations.</span>';
  } catch (e) {
    btn.disabled = false;
    input.insertAdjacentHTML('afterend', '<span class="load-error" style="display:block;margin-top:.4rem">Could not save correction.</span>');
  }
}

document.getElementById('logoutBtn').addEventListener('click', function () {
  fetch('/api/admin/logout', { method: 'POST' }).finally(function () { location.href = '/login'; });
});

document.addEventListener('DOMContentLoaded', () => ensureAuth().then(load));
</script>
</body>
</html>
