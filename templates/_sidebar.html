<aside class="sidebar" id="edgeSidebar">
  <div class="card sidebar-card sidebar-card--challenge">
    <img class="icon icon-emoji sidebar-card-deco" src="/static/icons/color/target.svg" alt="" aria-hidden="true">
    <p class="section-title" style="margin-top:0;color:var(--nav-quiz)" data-i18n="sidebar.dailyChallenge">Daily Challenge</p>
    <div class="sidebar-card-icon-row">
      <span class="icon-badge"><img class="icon icon-emoji" src="/static/icons/color/quiz.svg" alt="" aria-hidden="true"></span>
      <div>
        <p class="card-label" id="sidebarChallengeTopic" style="margin-bottom:0" data-i18n="sidebar.takeQuiz">Take a quiz</p>
        <p class="body-text" style="margin:0" data-i18n="sidebar.sharpenSubject">Sharpen a subject in a few minutes.</p>
      </div>
    </div>
    <a href="/quiz" class="btn-secondary" data-i18n="sidebar.startNow">Start now →</a>
  </div>

  <div class="card sidebar-card" id="sidebarBadgesCard">
    <img class="icon icon-emoji sidebar-card-deco" src="/static/icons/color/progress.svg" alt="" aria-hidden="true">
    <p class="section-title" style="margin-top:0;color:var(--nav-progress)" data-i18n="sidebar.yourBadges">Your Badges</p>
    <div id="sidebarBadgesBody" class="sidebar-empty">
      <img class="icon icon-emoji" src="/static/icons/color/award.svg" alt="" aria-hidden="true">
      <span data-i18n="sidebar.noBadges">Enter your name on the Progress page to see your badges here.</span>
    </div>
  </div>

  <div class="card sidebar-card" id="sidebarStatsCard">
    <img class="icon icon-emoji sidebar-card-deco" src="/static/icons/color/clipboard.svg" alt="" aria-hidden="true">
    <p class="section-title" style="margin-top:0;color:var(--nav-chat)" data-i18n="sidebar.thisWeek">This Week</p>
    <div id="sidebarStatsBody" class="sidebar-empty">
      <img class="icon icon-emoji" src="/static/icons/color/sparkles.svg" alt="" aria-hidden="true">
      <span data-i18n="sidebar.noActivity">Your quiz and session activity will show up here once you start learning.</span>
    </div>
  </div>
</aside>

<script>
(function () {
  function T(key, fallback) { return (window.EduI18n && window.EduI18n.t) ? window.EduI18n.t(key) : fallback; }

  var _lastData = null;   // cached so a language switch can re-render without refetching

  async function loadSidebar() {
    var name = localStorage.getItem('edu_student_name');
    if (!name) return;
    try {
      var r = await fetch('/api/progress/by-name/' + encodeURIComponent(name));
      if (!r.ok) return;
      var d = await r.json();
      _lastData = d;
      renderBadges(d);
      renderStats(d);
    } catch (e) { /* offline or no data yet — keep empty state */ }
  }

  // Re-render dynamic content in the newly selected language, without a network round-trip.
  function refreshLang() {
    if (!_lastData) return;
    renderBadges(_lastData);
    renderStats(_lastData);
  }

  function renderBadges(d) {
    var body = document.getElementById('sidebarBadgesBody');
    var badges = d.badges || [];
    if (!badges.length) return;
    var C = '/static/icons/color/';
    var badgeIcons = {'First Step':'sparkles','Quiz Ace':'progress','Week Warrior':'zap','Dialect Pioneer':'globe'};
    body.classList.remove('sidebar-empty');
    body.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:.5rem">' +
      badges.slice(0, 10).map(function (b) {
        return '<span class="badge-card" style="cursor:default"><img class="icon icon-emoji" src="' + C + (badgeIcons[b] || 'award') + '.svg" alt="" aria-hidden="true"> ' + T('badge.' + b, b) + '</span>';
      }).join('') + '</div><a href="/progress" class="btn-secondary" style="margin-top:1.5rem">' + T('sidebar.viewAll', 'View all →') + '</a>';
  }

  function renderStats(d) {
    var body = document.getElementById('sidebarStatsBody');
    var quizzes = d.quiz_results || [];
    var sessions = d.sessions || 0;
    if (!sessions && !quizzes.length) return;
    var best = quizzes.reduce(function (m, q) { return Math.max(m, Math.round(q.score / q.total * 100)); }, 0);
    var goal = 5;
    var pct = Math.min(100, Math.round(quizzes.length / goal * 100));
    body.classList.remove('sidebar-empty');
    body.innerHTML =
      '<p class="card-label">' + T('sidebar.quizSessions', '{q} quizzes · {s} sessions').replace('{q}', quizzes.length).replace('{s}', sessions) + '</p>' +
      (quizzes.length ? '<p class="body-text">' + T('sidebar.bestScore', 'Best score so far: {pct}%').replace('{pct}', best) + '</p>' : '') +
      '<div class="sidebar-progress-track"><div class="sidebar-progress-fill" style="width:' + pct + '%;--card-accent:var(--nav-chat)"></div></div>' +
      '<p class="body-text" style="margin-top:.4rem">' + T('sidebar.recentQuizzes', '{n} / {goal} recent quizzes').replace('{n}', Math.min(quizzes.length, goal)).replace('{goal}', goal) + '</p>';
  }

  document.addEventListener('DOMContentLoaded', loadSidebar);
  window.EdgeSidebarRefresh = refreshLang;
})();
</script>
